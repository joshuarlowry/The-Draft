summary: >-
  Jared Spool's work on design maturity and evidence-based UX has influenced how design teams scale and demonstrate
  value.
long_summary: >-
  Spool has advocated for evidence-based design, usability testing, and design maturity in organizations. His work on
  design ops, design systems, and the business impact of UX has influenced how design teams scale and demonstrate value.
  Center Centre's articles and programs extend these themes.
