source_id: hbr_mckinsey_faces_ai_future
source_type: article
summary: >-
  Harvard Business Review examines how McKinsey is restructuring its own organization around AI, shifting to
  outcomes-based work with roughly one-third of revenue from underwriting outcomes.
long_summary: >-
  Published December 2025, this HBR deep dive examines McKinsey's own organizational transformation in response to AI.
  The firm is shifting from traditional time-and-materials consulting toward outcomes-based work, with roughly one-third
  of revenue now coming from underwriting outcomes. This requires blending human judgment with AI agents and
  fundamentally changes team composition, delivery models, and how consultants are evaluated and promoted. The piece
  offers a rare inside look at how one of the world's most influential consulting firms is practicing what it preaches
  about AI-driven organizational change.
key_takeaways:
  - McKinsey is shifting to outcomes-based work with roughly one-third of revenue from underwriting outcomes
  - The shift requires blending human judgment with AI agents in delivery teams
  - Team composition and promotion criteria are changing alongside delivery models
  - Consulting firms are restructuring their own organizations, not just advising others
relevance: >-
  A powerful case study for The Draft: when even the firms advising on AI transformation must transform themselves, it
  validates that structural change is not optional. The emphasis on human judgment alongside AI mirrors the site's core
  themes.
