source_id: nasem_open_secrets_alternative_data_video
source_type: video
summary: >-
  In this NASEM ICSB colloquium talk, Davey Gibian outlines how open-source and alternative data can be translated into
  actionable intelligence when analysts pair broad data access with disciplined interpretation.
long_summary: >-
  Gibian's presentation focuses on extracting strategic value from open-source alternative data, moving from consumer
  data signals to mission-oriented intelligence use cases. The structure (as reflected in chapter markers) emphasizes the
  practical challenge of turning noisy, heterogeneous data streams into decision support. The talk complements his later
  AI-security framing by showing the front-end intelligence workflow where data quality, context, and analytical judgment
  matter before model outputs are trusted.
key_takeaways:
  - Expand intelligence inputs beyond traditional datasets to include alternative open-source signals
  - Translate raw open-source data into mission planning support through structured analytic workflows
  - Use algorithmic intelligence techniques as augmentation, not replacement, for analyst judgment
  - Design data pipelines to handle noisy consumer-style sources without losing operational relevance
relevance: >-
  Useful for The Draft's planning and IA themes because it connects data architecture choices to downstream analysis
  quality. It reinforces that AI and analytics effectiveness depend on upstream information design discipline.
notable_quotes:
  - >-
    Mr. Davey Gibian, Janes This presentation is part of the second colloquium on Revolution in Intelligence Affairs.
  - >-
    Open Secrets: Harnessing the Value of Open Source Alternative Data.
