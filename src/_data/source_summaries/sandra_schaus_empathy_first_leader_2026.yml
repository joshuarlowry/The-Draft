source_id: sandra_schaus_empathy_first_leader_2026
source_type: article
summary: >-
  Sandra Schaus positions empathy-centered leadership as a durable capability in AI-first organizations where speed can
  otherwise crowd out context and human understanding.
long_summary: >-
  This article emphasizes leadership behaviors needed when teams adopt AI at scale, highlighting empathy and
  human-centered communication as stabilizers during rapid change. For The Draft, it offers a people-and-practice
  perspective that complements more technical discussions of prompts, tools, and guardrails.
key_takeaways:
  - Prioritize empathy as a leadership practice when AI changes team workflows
  - Balance automation gains with attention to team trust and communication quality
  - Build human-centered management habits that preserve context and accountability
relevance: >-
  Reinforces The Draft's perspective that AI transformation is organizational as much as technical. Leadership practices
  act as guardrails for how speed is absorbed.
