source_id: covert_how_to_make_sense
summary: Abby Covert's guide helps teams align on language, structure, and meaning when tackling information problems.
long_summary: >-
  'How to Make Sense of Any Mess' is a practical guide to information architecture for product and design teams. Covert
  focuses on taxonomies, mental models, and collaborative sense-making. The book helps teams align on language and
  structure before building, reducing ambiguity and improving outcomes.
