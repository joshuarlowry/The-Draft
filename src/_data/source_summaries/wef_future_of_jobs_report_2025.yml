source_id: wef_future_of_jobs_report_2025
source_type: paper
summary: >-
  World Economic Forum survey data on how employers expect AI and other macro forces to reshape roles, skills, and net
  employment through 2030.
long_summary: >-
  The Future of Jobs Report 2025 synthesizes global employer survey responses to estimate job creation, job
  displacement, and the scale of workforce transition expected over the next five years. It presents a mixed picture:
  some roles decline as automation expands, while others grow around analytics, AI, and human-centered capabilities. The
  report is useful for separating headline fear from role-level transition planning.
key_takeaways:
  - Quantifies projected job creation and displacement rather than treating AI impact as a single-direction story
  - Identifies role categories with the highest transition pressure, especially routine information-processing work
  - Shows rising demand for blended skill profiles that combine technical fluency with human judgment
  - Frames reskilling speed as a primary determinant of whether disruption becomes unemployment or mobility
relevance: >-
  Directly supports The Draft's planning lens by treating workforce change as an execution problem: design transitions
  early, or absorb them later as organizational and social friction.
