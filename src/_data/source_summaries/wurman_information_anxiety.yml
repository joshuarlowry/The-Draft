source_id: wurman_information_anxiety
summary: Richard Saul Wurman's 'Information Anxiety' explores how to make complex information understandable.
long_summary: >-
  Wurman coined the term 'information architecture' and in 'Information Anxiety' examined why people feel overwhelmed by
  information. The book addresses how to organize, present, and structure information so it becomes comprehensible. His
  work has shaped IA practice and the design of events, books, and exhibitions for clarity.
