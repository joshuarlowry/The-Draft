source_id: mckinsey_redesign_work_for_ai
source_type: article
summary: >-
  McKinsey Global Institute calls on leaders to make workflow redesign their top AI priority, arguing that restructuring
  work around human-AI partnerships produces far greater impact than adding AI to existing processes.
long_summary: >-
  Published January 2026, this McKinsey Global Institute piece argues that the biggest EBIT impact from generative AI
  comes from redesigning workflows rather than automating them in place. Leaders are urged to treat 2026 as a year of
  organizational redesign, rethinking team composition, decision rights, and collaboration patterns. The piece notes
  that 32% of organizations expect workforce decreases due to AI, 43% expect no change, and 13% expect
  increases—indicating divergent strategies.
key_takeaways:
  - Workflow redesign produces the biggest EBIT impact from generative AI
  - Leaders should treat 2026 as a year of organizational redesign, not just AI adoption
  - 32% of organizations expect workforce decreases, 43% no change, 13% increases due to AI
  - Adding AI to unchanged processes yields diminishing returns
relevance: >-
  Reinforces The Draft's position that planning and structure determine AI outcomes. Workforce redesign is the
  organizational equivalent of spec-driven development—intentional structure before execution.
