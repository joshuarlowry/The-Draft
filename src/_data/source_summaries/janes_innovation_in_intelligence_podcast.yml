source_id: janes_innovation_in_intelligence_podcast
source_type: podcast
summary: >-
  This Janes episode examines how intelligence organizations can sustain innovation under pressure, featuring Davey
  Gibian on collaboration constraints, organizational behavior, and practical innovation conditions.
long_summary: >-
  In this World of Intelligence episode, Janes frames innovation as an operational necessity for intelligence teams,
  especially when complexity and uncertainty are high. The discussion with Davey Gibian (then Head of Innovation at
  Janes) centers on what enables organizations to innovate in intelligence workflows and why superficial collaboration
  rituals are insufficient. The episode highlights the distinction between performative collaboration and deliberate
  practices that produce usable outcomes in constrained environments.
key_takeaways:
  - Treat innovation in intelligence as a core operational capability, not a side initiative
  - Separate real collaboration outcomes from activity that only appears collaborative
  - Build organizational routines that continue learning when external conditions restrict teamwork
  - Anchor innovation efforts in decision quality and field utility rather than novelty alone
relevance: >-
  Supports The Draft's themes around engineering judgment and organizational design for AI-era work. It reinforces that
  process quality and collaboration mechanics shape whether new technology actually improves outcomes.
notable_quotes:
  - >-
    Innovation in intelligence has never been more vital to ensure organisations are not left behind.
  - >-
    In this podcast episode the Janes Intelligence Unit addresses these questions with Davey Gibian, Head of Innovation
    at Janes, who describes the crucial elements of innovation and explains why collaboration does not equate to
    innovation.
