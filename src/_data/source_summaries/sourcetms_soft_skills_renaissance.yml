notable_quotes:
  - >-
    The vast majority of work is done by AI, with humans providing the direction through strategic or creative prompting
    and additional context.
  - >-
    AI is acting as both the great equalizer, creating a 'builder middle class' for every domain, and at the same time a
    divider.
