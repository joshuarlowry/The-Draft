summary: ETC Journal distinguishes critical UX differences between AI and agentic AI.
long_summary: >-
  This article identifies key UX distinctions between conventional AI (assistive, reactive) and agentic AI (autonomous,
  proactive). It argues that design patterns, feedback mechanisms, and user expectations must differ when systems take
  initiative and execute multi-step tasks.
