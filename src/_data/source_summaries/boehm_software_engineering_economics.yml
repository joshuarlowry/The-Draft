key_takeaways:
  - The cost of fixing defects rises exponentially as projects progress through lifecycle phases
  - Early detection through planning, review, and validation is dramatically cheaper than late fixes
  - Upstream rigor—clear requirements, design evaluation, early testing—reduces downstream cost and risk
  - Quantifies the economic case for proactive engineering disciplines
relevance: >-
  Foundational reference for The Draft's emphasis on planning and upfront rigor. Provides economic justification for why
  oversight and review pay dividends throughout the project lifecycle.
