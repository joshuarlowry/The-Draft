source_id: hall_just_enough_research
summary: Erika Hall's guide to research-driven design, inclusive language, and the strategic role of design in organizations.
long_summary: >-
  'Just Enough Research' advocates for research-driven design without over-investing. Hall covers research methods,
  inclusive language, and the strategic role of design. Her work on conversational design and design ethics has
  influenced UX practice and how teams integrate research into product development.
