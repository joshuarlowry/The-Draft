source_id: imf_gen_ai_future_of_work_2024
source_type: article
summary: >-
  IMF leadership perspective on how generative AI could raise productivity while also increasing inequality risk without
  policy and organizational guardrails.
long_summary: >-
  In this IMF analysis, Kristalina Georgieva argues that generative AI is likely to affect a substantial share of jobs,
  with advanced economies often seeing higher exposure because of task composition. The piece emphasizes that the
  central question is distribution: who captures AI gains and who bears transition costs. It calls for proactive policy
  on social protection, reskilling, and labor market adaptation to avoid demand-side erosion where productivity rises
  but household purchasing power weakens.
key_takeaways:
  - Warns that AI can boost output while still widening inequality if gains are narrowly captured
  - Distinguishes job exposure from deterministic job loss, highlighting task-level transformation
  - Prioritizes reskilling and social policy as mechanisms to preserve broad-based purchasing power
  - Connects labor transitions to macroeconomic stability, not just firm-level efficiency
relevance: >-
  Highly relevant to The Draft's guardrail stance: technical acceleration is insufficient if institutions and operating
  models fail to protect human agency and economic participation.
