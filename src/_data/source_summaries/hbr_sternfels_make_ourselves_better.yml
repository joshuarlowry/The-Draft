source_id: hbr_sternfels_make_ourselves_better
source_type: article
summary: >-
  McKinsey managing partner Bob Sternfels discusses in a January 2026 HBR interview how AI is reshaping team composition
  and delivery models at McKinsey, providing a first-person account of organizational restructuring.
long_summary: >-
  In this January/February 2026 Harvard Business Review interview, McKinsey managing partner Bob Sternfels discusses the
  firm's AI-era transformation. He describes how consulting teams are being restructured to integrate AI agents into
  delivery, how new roles are emerging, and how the firm is balancing AI-driven efficiency with the human judgment that
  clients value. The interview provides a leadership perspective on navigating organizational change when AI
  capabilities are advancing rapidly.
key_takeaways:
  - Leadership must actively redesign team composition, not just adopt tools
  - New roles emerge when AI takes over execution tasks traditionally done by junior consultants
  - Balancing AI efficiency with human judgment is a deliberate organizational design choice
relevance: >-
  Provides a senior leadership perspective on AI-driven team restructuring that connects to The Draft's emphasis on
  intentional planning and oversight as the foundation for effective AI integration.
