source_id: goodwin_designing_digital_age
summary: Kim Goodwin's comprehensive guide to goal-directed design and translating research into coherent product structure.
long_summary: >-
  'Designing for the Digital Age' presents goal-directed design methods developed at Cooper. Goodwin details how to
  translate research into personas, scenarios, and requirements, and how to structure products for coherent user
  experience. The book bridges IA, interaction design, and design leadership.
