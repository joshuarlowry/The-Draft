source_id: nadella_hit_refresh
summary: Satya Nadella’s memoir covers Microsoft’s cultural and strategic shift toward cloud-first and AI-era priorities.
long_summary: >-
  Hit Refresh recounts Satya Nadella’s perspective on Microsoft’s transformation, blending personal narrative with a
  discussion of the company’s shift to cloud services and emerging AI priorities. The book highlights leadership
  decisions that reshaped Microsoft’s culture, emphasizing growth mindset and organizational learning. It provides
  context on how executive strategy and cultural change underpin technology adoption at scale.
