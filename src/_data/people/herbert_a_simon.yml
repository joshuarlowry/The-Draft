profile_summary: >-
  Herbert A. Simon was a Nobel laureate in economics and a pioneer in artificial intelligence, cognitive science, and
  organizational theory. His work on bounded rationality, satisficing, and the structure of ill-structured problems has
  influenced design, architecture, and how we understand human and machine decision-making.
