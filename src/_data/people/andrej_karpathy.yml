profile_summary: >-
  Andrej Karpathy is a leading AI researcher and former director of AI at Tesla. He co-founded OpenAI and has made
  foundational contributions to deep learning, computer vision, and large language models. His work on CNNs, ImageNet,
  and neural network training has shaped modern AI. He now focuses on AI coding tools and has publicly reflected on how
  Claude Code and similar systems are changing software engineering practice.
