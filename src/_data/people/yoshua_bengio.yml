profile_summary: >-
  Yoshua Bengio is a Turing Award-winning AI researcher and professor at Université de Montréal. His work on deep
  learning, neural networks, and representation learning has been foundational to modern AI. He now focuses on AI
  safety, responsible AI development, and the societal implications of advanced AI systems.
