profile_summary: >-
  Don Norman is a cognitive scientist and design theorist who coined the term "user experience." He has shaped design
  thinking through concepts like affordances, mental models, and emotional design. His work at Apple, Nielsen Norman
  Group, and in academia has influenced how we understand human-centered design.
