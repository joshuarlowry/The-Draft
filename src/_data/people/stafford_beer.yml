profile_summary: >-
  Stafford Beer was a theorist of management cybernetics and organizational design. His Viable System Model describes
  how organizations must be structured to remain adaptable and responsive. His work on real-time management and the
  relationship between information systems and organizational viability has influenced systems thinking and governance.
