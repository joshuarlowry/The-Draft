profile_summary: >-
  Eberhardt Rechtin was a pioneering systems architect who developed the discipline of systems architecting. He worked
  on spacecraft and defense systems at JPL and DARPA, and his frameworks for heuristics, stakeholder analysis, and
  quality attributes have shaped how complex systems are designed and evaluated.
