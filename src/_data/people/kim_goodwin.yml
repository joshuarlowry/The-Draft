profile_summary: >-
  Kim Goodwin is a design leader and author of "Designing for the Digital Age." She has led design at Cooper and other
  firms, developing goal-directed design methods and frameworks for translating research into coherent product
  structure. Her work bridges IA, interaction design, and design leadership.
