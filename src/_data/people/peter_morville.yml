profile_summary: >-
  Peter Morville is a pioneer in information architecture and user experience. He co-authored "Information Architecture
  for the World Wide Web" and has shaped how organizations structure findability, navigation, and search. His work on
  ambient findability and cross-channel experience design bridges IA and UX practice.
