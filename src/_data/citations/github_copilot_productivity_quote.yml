id: github_copilot_productivity_quote
quote: >-
  The striking difference was that developers who used GitHub Copilot completed the task significantly faster–55% faster
  than the developers who didn’t use GitHub Copilot. Specifically, the developers using GitHub Copilot took on average 1
  hour and 11 minutes to complete the task, while the developers who didn’t use GitHub Copilot took on average 2 hours
  and 41 minutes.
source_id: github_copilot_productivity_research
